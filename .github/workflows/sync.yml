name: Sync Scryfall + MTGJson

on:
  schedule:
    - cron: '0 15 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          lfs: true

      - uses: actions/setup-node@v4
        with:
          node-version: '18'

      - run: npm install

      - run: NODE_OPTIONS="--max-old-space-size=4096" npm run sync

      - name: Setup Git LFS
        run: |
          git lfs install
          git lfs track "docs/*.json"
          git add .gitattributes

      - name: Commit and push
        run: |
          git config --local user.email "action@github.com"
          git config --local user.name "GitHub Action"
          git add docs/
          git commit -m "Auto-deploy: $(date)" || echo "No changes"
          git push